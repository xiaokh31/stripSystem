def resolveHermesCommand() {
    def os = org.gradle.internal.os.OperatingSystem.current()
    def platformDir = os.isMacOsX() ? "osx-bin" : os.isWindows() ? "win64-bin" : "linux64-bin"
    def executable = os.isWindows() ? "hermesc.exe" : "hermesc"
    def relativeCommandPath = "hermesc/${platformDir}/${executable}"

    def directDependency = new File(rootProject.projectDir, "../node_modules/hermes-compiler/${relativeCommandPath}")
    if (directDependency.exists()) {
        return directDependency.absolutePath
    }

    def pnpmStore = new File(rootProject.projectDir, "../../../node_modules/.pnpm")
    if (!pnpmStore.exists()) {
        return ""
    }

    def candidates = pnpmStore
        .listFiles({ File file -> file.name.startsWith("hermes-compiler@") } as FileFilter)
        ?.sort { a, b -> b.name <=> a.name } ?: []

    for (candidate in candidates) {
        def command = new File(candidate, "node_modules/hermes-compiler/${relativeCommandPath}")
        if (command.exists()) {
            return command.absolutePath
        }
    }

    return ""
}
