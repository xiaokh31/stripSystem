<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <style>
      @page {
        size: 150mm 100mm;
        margin: 0;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, "Noto Sans", sans-serif;
        color: #111;
      }

      .label {
        position: relative;
        width: 150mm;
        height: 100mm;
        padding: 6mm;
        page-break-after: always;
        overflow: hidden;
      }

      .label:last-child {
        page-break-after: auto;
      }

      .top {
        position: absolute;
        top: 6mm;
        left: 6mm;
        right: 6mm;
        font-size: 20pt;
        font-weight: 700;
        line-height: 1.2;
      }

      .top-left {
        position: absolute;
        left: 0;
        top: 0;
      }

      .top-right {
        position: absolute;
        right: 0;
        top: 0;
        text-align: right;
      }

      .top-pallet {
        text-align: right;
        font-size: 30pt;
      }

      .container {
        position: absolute;
        top: 23mm;
        left: 6mm;
        right: 6mm;
        font-size: 44pt;
        font-weight: 700;
        line-height: 0.95;
        overflow-wrap: anywhere;
      }

      .middle {
        position: absolute;
        top: 50mm;
        left: 6mm;
        right: 6mm;
        bottom: 10mm;
      }

      .destination-block {
        position: absolute;
        top: 0;
        left: 0;
        right: 34mm;
        bottom: 0;
      }

      .label-title {
        font-size: 10pt;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
        color: #555;
      }

      .destination {
        margin-top: 2mm;
        font-size: 50pt;
        font-weight: 700;
        line-height: 1;
      }

      .destination-line {
        white-space: nowrap;
      }

      .qr {
        position: absolute;
        top: 0;
        right: 0;
        width: 28mm;
        height: 28mm;
      }

      .qr img {
        width: 28mm;
        height: 28mm;
        display: block;
      }

      .bottom {
        position: absolute;
        left: 6mm;
        right: 6mm;
        bottom: 4mm;
      }

      .pallet-id {
        font-size: 7pt;
        line-height: 1.15;
        overflow-wrap: anywhere;
        text-align: right;
      }
    </style>
  </head>
  <body>
    {% for label in labels %}
      <section class="label">
        <div class="top">
          <div class="top-left">
            <div class="label-title">Date</div>
            <div>{{ label.date }}</div>
          </div>
          <div class="top-right">
            <div class="label-title">Pallet</div>
            <div class="top-pallet">{{ label.pallet_no }}</div>
          </div>
        </div>

        <div class="container">{{ label.container_no }}</div>

        <div class="middle">
          <div class="destination-block">
            <div class="label-title">Destination</div>
            <div class="destination" style="font-size: {{ label.destination_font_size }}">
              {% for line in label.destination_lines %}
                <div class="destination-line">{{ line }}</div>
              {% endfor %}
            </div>
          </div>
          <div class="qr">
            <img src="{{ label.qr_data_uri }}" alt="QR">
          </div>
        </div>

        <div class="bottom">
          <div class="pallet-id">{{ label.pallet_id }}</div>
        </div>
      </section>
    {% endfor %}
  </body>
</html>
