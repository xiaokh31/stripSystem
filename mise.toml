[tools]
node = "24"
python = "3.12"

[env]
NODE_ENV = "development"
PYTHONUTF8 = "1"
PYTHONIOENCODING = "utf-8"

[tasks]
check = "pnpm lint && pnpm typecheck && pnpm test"
dev = "pnpm dev"
docker-up = "docker compose -f infra/docker/compose.dev.yml up -d"
docker-down = "docker compose -f infra/docker/compose.dev.yml down"
