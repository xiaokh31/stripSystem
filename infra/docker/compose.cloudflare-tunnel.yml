# Cloudflare named-tunnel overlay. Use after compose.local.yml and
# compose.public.yml; it keeps the local stack canonical and adds one
# outbound-only connector that can resolve only nginx.
services:
  nginx:
    ports: !override
      - "${HTTP_PORT:-80}:80"
    networks:
      default: {}
      public_tunnel: {}

  cloudflared:
    image: cloudflare/cloudflared:2026.7.2@sha256:4f6655284ab3d252b7f28fedb19fe6c8fc82ee5b1295c20ac74d475e5398a52d
    container_name: bestar_cloudflared_local
    restart: unless-stopped
    depends_on:
      nginx:
        condition: service_healthy
        restart: true
    entrypoint: ["cloudflared", "--no-autoupdate"]
    command:
      [
        "tunnel",
        "--metrics",
        "0.0.0.0:2000",
        "--loglevel",
        "info",
        "--transport-loglevel",
        "warn",
        "--url",
        "http://nginx:80",
        "run",
        "--token-file",
        "/run/secrets/cloudflare_tunnel_token",
      ]
    secrets:
      - source: cloudflare_tunnel_token
        target: cloudflare_tunnel_token
        mode: 0400
    networks:
      public_tunnel: {}
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 100
    mem_limit: 256m
    cpus: "0.50"
    healthcheck:
      test:
        [
          "CMD",
          "cloudflared",
          "tunnel",
          "--metrics",
          "127.0.0.1:2000",
          "ready",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    profiles: ["public-tunnel"]

  tunnel-origin-probe:
    image: nginx:1.27-alpine
    entrypoint: ["/bin/sh", "-euc"]
    command:
      - >-
        wget -qO- http://nginx/api/health >/dev/null &&
        wget -qO- http://nginx/ >/dev/null
    networks:
      public_tunnel: {}
    read_only: true
    tmpfs:
      - /tmp:size=4m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    profiles: ["public-tunnel-test"]

  tunnel-drill-sentinel:
    image: nginx:1.27-alpine
    entrypoint: ["/bin/sh", "-c", "while :; do sleep 3600; done"]
    networks:
      public_tunnel: {}
    read_only: true
    tmpfs:
      - /tmp:size=4m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    profiles: ["public-tunnel-test"]

secrets:
  cloudflare_tunnel_token:
    file: ${CLOUDFLARE_TUNNEL_TOKEN_FILE:-../../.secrets/cloudflare-tunnel-token}

networks:
  public_tunnel:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME:-docker}_bestar_public_tunnel
