services:
  postgres:
    image: postgres:17-alpine
    container_name: bestar_postgres_local
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bestar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bestar_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-bestar_unloading}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - bestar_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: bestar_redis_local
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    image: bestar_api_local:latest
    container_name: bestar_api_local
    restart: unless-stopped
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CI: "true"
      TZ: ${TZ:-America/Edmonton}
      OPERATIONAL_TIME_ZONE: ${OPERATIONAL_TIME_ZONE:-America/Edmonton}
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-bestar}:${POSTGRES_PASSWORD:-bestar_dev_password}@postgres:5432/${POSTGRES_DB:-bestar_unloading}?schema=public
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:3000,http://127.0.0.1:3000}
      STORAGE_ROOT: /workspace/storage
      WORKER_PYTHON_DIR: /workspace/apps/worker-python
      REPORT_TEMPLATE_PATH: /workspace/samples/templates/卸柜报告-En.xlsx
      JWT_SECRET: ${JWT_SECRET:-replace-with-long-random-secret}
      JWT_EXPIRES_IN_SECONDS: ${JWT_EXPIRES_IN_SECONDS:-34560000}
    volumes:
      - ../../storage:/workspace/storage
      - bestar_pnpm_store:/root/.local/share/pnpm/store
      - bestar_node_modules:/workspace/node_modules
      - bestar_api_node_modules:/workspace/apps/api/node_modules
      - bestar_web_node_modules:/workspace/apps/web/node_modules
      - bestar_worker_venv:/workspace/apps/worker-python/.venv
    command: >
      sh -lc "corepack enable &&
      pnpm install --frozen-lockfile=false --ignore-scripts &&
      pnpm --filter api prisma generate &&
      pnpm --filter api prisma migrate deploy &&
      pnpm --filter api build &&
      node apps/api/dist/src/main.js"
    expose:
      - "4000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 180s

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    image: bestar_web_local:latest
    container_name: bestar_web_local
    restart: unless-stopped
    working_dir: /workspace
    depends_on:
      api:
        condition: service_healthy
    environment:
      CI: "true"
      TZ: ${TZ:-America/Edmonton}
      NEXT_PUBLIC_OPERATIONAL_TIME_ZONE: ${NEXT_PUBLIC_OPERATIONAL_TIME_ZONE:-America/Edmonton}
      API_BASE_URL: ${WEB_SERVER_API_BASE_URL:-http://api:4000/api}
      API_PROXY_BASE_URL: ${WEB_API_PROXY_BASE_URL:-http://api:4000/api}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    volumes:
      - bestar_pnpm_store:/root/.local/share/pnpm/store
      - bestar_node_modules:/workspace/node_modules
      - bestar_api_node_modules:/workspace/apps/api/node_modules
      - bestar_web_node_modules:/workspace/apps/web/node_modules
      - bestar_web_next:/workspace/apps/web/.next
    command: >
      sh -lc "corepack enable &&
      pnpm install --frozen-lockfile=false --ignore-scripts &&
      pnpm --filter web build &&
      pnpm --filter web exec next start --hostname 0.0.0.0 --port 3000"
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 180s

  worker-python:
    build:
      context: ../..
      dockerfile: infra/docker/worker-python.Dockerfile
    image: bestar_worker_python_local:latest
    container_name: bestar_worker_python_local
    restart: unless-stopped
    working_dir: /workspace/apps/worker-python
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      STORAGE_ROOT: /workspace/storage
      TZ: ${TZ:-America/Edmonton}
      OPERATIONAL_TIME_ZONE: ${OPERATIONAL_TIME_ZONE:-America/Edmonton}
      DATABASE_URL: postgresql://${POSTGRES_USER:-bestar}:${POSTGRES_PASSWORD:-bestar_dev_password}@postgres:5432/${POSTGRES_DB:-bestar_unloading}?schema=public
      REDIS_URL: redis://redis:6379
    volumes:
      - ../../storage:/workspace/storage
      - bestar_worker_venv:/workspace/apps/worker-python/.venv
    command: >
      sh -lc "uv sync --frozen && tail -f /dev/null"
    healthcheck:
      test: ["CMD-SHELL", "test -x .venv/bin/unloading-worker"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 120s

  nginx:
    image: nginx:1.27-alpine
    container_name: bestar_nginx_local
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  e2e-web:
    build:
      context: ../..
      dockerfile: infra/docker/web-e2e.Dockerfile
    image: bestar_web_e2e_local:latest
    working_dir: /workspace
    depends_on:
      nginx:
        condition: service_healthy
    environment:
      CI: "true"
      E2E_BASE_URL: http://nginx
      E2E_ADMIN_EMAIL: ${E2E_ADMIN_EMAIL:-}
      E2E_ADMIN_PASSWORD: ${E2E_ADMIN_PASSWORD:-}
    volumes:
      - ../../test-results:/workspace/apps/web/test-results
    profiles: ["e2e"]

volumes:
  bestar_postgres_data:
  bestar_pnpm_store:
  bestar_node_modules:
  bestar_api_node_modules:
  bestar_web_node_modules:
  bestar_web_next:
  bestar_worker_venv:
