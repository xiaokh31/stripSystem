services:
  postgres:
    image: postgres:17-alpine
    container_name: bestar_postgres_local
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bestar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bestar_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-bestar_unloading}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - bestar_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bestar_redis_local
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"

  api:
    image: node:22-alpine
    container_name: bestar_api_local
    restart: unless-stopped
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PORT: ${API_PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://bestar:bestar_dev_password@postgres:5432/bestar_unloading?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      STORAGE_ROOT: /workspace/storage
      JWT_SECRET: ${JWT_SECRET:-change-this-in-local-env}
    volumes:
      - ../../:/workspace
      - ../../storage:/workspace/storage
    command: >
      sh -lc "corepack enable &&
      pnpm install --frozen-lockfile=false &&
      pnpm --filter api start:dev"
    expose:
      - "${API_PORT:-4000}"

  web:
    image: node:22-alpine
    container_name: bestar_web_local
    restart: unless-stopped
    working_dir: /workspace
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost/api}
    volumes:
      - ../../:/workspace
    command: >
      sh -lc "corepack enable &&
      pnpm install --frozen-lockfile=false &&
      pnpm --filter web exec next dev --hostname 0.0.0.0 --port 3000"
    expose:
      - "3000"

  worker-python:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    container_name: bestar_worker_python_local
    restart: unless-stopped
    working_dir: /workspace/apps/worker-python
    depends_on:
      - postgres
      - redis
    environment:
      STORAGE_ROOT: /workspace/storage
      DATABASE_URL: ${DATABASE_URL:-postgresql://bestar:bestar_dev_password@postgres:5432/bestar_unloading?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    volumes:
      - ../../:/workspace
      - ../../storage:/workspace/storage
    command: >
      sh -lc "uv sync && tail -f /dev/null"

  nginx:
    image: nginx:1.27-alpine
    container_name: bestar_nginx_local
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  bestar_postgres_data:
