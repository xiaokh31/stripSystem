services:
  postgres:
    image: postgres:17-alpine
    container_name: sxtrans_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sxtrans
      POSTGRES_PASSWORD: sxtrans_dev_password
      POSTGRES_DB: sxtrans_unloading
    ports:
      - "5432:5432"
    volumes:
      - sxtrans_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sxtrans_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  sxtrans_postgres_data:
