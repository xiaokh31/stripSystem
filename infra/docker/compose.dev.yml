services:
  postgres:
    image: postgres:17-alpine
    container_name: bestar_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bestar
      POSTGRES_PASSWORD: bestar_dev_password
      POSTGRES_DB: bestar_unloading
    ports:
      - "5432:5432"
    volumes:
      - bestar_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bestar_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  bestar_postgres_data:
